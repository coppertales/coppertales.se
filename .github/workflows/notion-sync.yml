name: Sync Notion → GitHub Pages

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Sync Notion data
        env:
          NOTION_TOKEN:         ${{ secrets.NOTION_TOKEN }}
          NOTION_BLOG_DB_ID:    ${{ secrets.NOTION_BLOG_DB_ID }}
          NOTION_GALLERY_DB_ID: ${{ secrets.NOTION_GALLERY_DB_ID }}
        run: python scripts/sync_notion.py
      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/blog.json data/gallery.json
          if git diff --cached --quiet; then
            echo "Inga ändringar."
          else
            git commit -m "chore: synka Notion-data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

  deploy:
    runs-on: ubuntu-latest
    needs: sync
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - id: deployment
        uses: actions/deploy-pages@v4
