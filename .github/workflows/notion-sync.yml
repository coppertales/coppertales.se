name: Sync Notion → GitHub Pages

on:
  # Kör automatiskt varje dag kl 06:00
  schedule:
    - cron: '0 6 * * *'

  # Kör direkt vid push till main
  push:
    branches: [ main ]

  # Gör det möjligt att köra manuellt från GitHub UI
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    name: Hämta från Notion och deploya

    steps:
      # 1. Checka ut repot
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Sätt upp Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Kör sync-skriptet (inga extra beroenden – bara standardbibliotek)
      - name: Sync Notion data
        env:
          NOTION_TOKEN:           ${{ secrets.NOTION_TOKEN }}
          NOTION_DOGS_DB_ID:      ${{ secrets.NOTION_DOGS_DB_ID }}
          NOTION_LITTERS_DB_ID:   ${{ secrets.NOTION_LITTERS_DB_ID }}
          NOTION_BLOG_DB_ID:      ${{ secrets.NOTION_BLOG_DB_ID }}
          NOTION_GALLERY_DB_ID:   ${{ secrets.NOTION_GALLERY_DB_ID }}
        run: python scripts/sync_notion.py

      # 4. Committa de uppdaterade JSON-filerna om det finns ändringar
      - name: Commit data files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dogs.json data/litters.json data/blog.json data/gallery.json
          if git diff --cached --quiet; then
            echo "Inga ändringar – inget att committa."
          else
            git commit -m "chore: synka Notion-data $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase
            git push
          fi

  deploy:
    runs-on: ubuntu-latest
    name: Deploya till GitHub Pages
    needs: sync

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main   # Se till att vi har senaste data efter sync-jobbet

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'   # Ladda upp hela repots rot

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
